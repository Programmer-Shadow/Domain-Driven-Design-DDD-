server:
  port: 8081

spring:
  application:
    name: order-service
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true

# 防腐层配置：外部 User Service 地址
acl:
  user-service:
    base-url: http://localhost:8082

# Feign 客户端配置（防腐层的 HTTP 通道）
feign:
  client:
    config:
      user-service:
        connect-timeout: 2000   # 2秒连接超时
        read-timeout: 5000      # 5秒读取超时

logging:
  level:
    com.example.orderservice: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
